name: Google Home Bridge
version: 1.0.0
slug: google_home_bridge
description: Self-hosted Google Home / Google Assistant voice control — replaces the Nabu Casa Google integration
url: https://github.com/domenix/google-home-bridge
arch:
  - aarch64
  - amd64
init: false
startup: services
ingress: true
ingress_port: 8099
panel_icon: mdi:google-assistant
panel_title: Google Home Bridge
homeassistant_api: true
hassio_api: true
hassio_role: homeassistant
map:
  - homeassistant_config:rw
  - ssl
ports:
  8124/tcp: null
ports_description:
  8124/tcp: Public fulfillment endpoint (only needed for direct TLS mode)
options:
  mode: cloudflared
  public_url: ""
  cloudflared_token: ""
  certfile: fullchain.pem
  keyfile: privkey.pem
  install_integration: true
  log_level: info
schema:
  mode: list(cloudflared|direct|external)
  public_url: str?
  cloudflared_token: password?
  certfile: str
  keyfile: str
  install_integration: bool
  log_level: list(debug|info|warning|error)
