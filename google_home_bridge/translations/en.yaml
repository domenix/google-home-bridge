configuration:
  mode:
    name: Exposure mode
    description: >-
      How Google reaches your instance. "external" (default) assumes you
      already publish Home Assistant over HTTPS (tunnel add-on, reverse
      proxy, …). "direct" serves TLS on port 8124 using certificates from
      /ssl (you port-forward 443 to it).
  public_url:
    name: Public URL
    description: >-
      The public HTTPS base URL Google will use, e.g. https://ha.example.com.
  certfile:
    name: TLS certificate file
    description: Certificate in /ssl, used in direct mode.
  keyfile:
    name: TLS private key file
    description: Private key in /ssl, used in direct mode.
  install_integration:
    name: Install the cloud shim integration
    description: >-
      Automatically install/update the bundled custom integration into
      /config/custom_components/cloud. Disable only if you manage it yourself.
  log_level:
    name: Log level
    description: Bridge log verbosity.
